services:
  mysql:
    image: mysql:8.0
    container_name: juzhi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: sulei1124
      MYSQL_DATABASE: ai_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 首次启动自动执行初始化（MySQL自身执行，非shell，$符号安全）
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: juzhi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: juzhi-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: sulei1124
      SPRING_DATA_REDIS_HOST: redis
      SPRING_SQL_INIT_MODE: always
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
